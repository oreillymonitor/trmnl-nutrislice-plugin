name: Update Menu

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update-menu:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Fetch and Parse Menu
        run: |
          DAY_OF_WEEK=$(date +%w)
          if [ $DAY_OF_WEEK -eq 6 ] || [ $DAY_OF_WEEK -eq 0 ]; then
            # It's Saturday or Sunday, fetch next week (upcoming Monday)
            FETCH_DATE=$(date -d "next monday" +%Y/%m/%d)
          else
            FETCH_DATE=$(date +%Y/%m/%d)
          fi
          
          DISTRICT="${{ vars.NUTRISLICE_DISTRICT }}"
          SCHOOL="${{ vars.NUTRISLICE_SCHOOL_ID }}"
          
          if [ -z "$DISTRICT" ]; then echo "Error: NUTRISLICE_DISTRICT variable is not set" && exit 1; fi
          if [ -z "$SCHOOL" ]; then echo "Error: NUTRISLICE_SCHOOL_ID variable is not set" && exit 1; fi

          echo "Fetching menu for $DISTRICT / $SCHOOL on date: $FETCH_DATE"
          curl -s "https://${DISTRICT}.api.nutrislice.com/menu/api/weeks/school/${SCHOOL}/menu-type/lunch/${FETCH_DATE}/?format=json" > raw.json
          jq --arg school_name "School Menu" '{school_name: $school_name, days: [.days[] | select(.menu_items | length > 0) | {date: .date, main: ([.menu_items[] | select(.food != null) | .food.name][0] // "No Lunch"), image: (([.menu_items[] | select(.image != null and .image != "") | .image][0]) // ([.menu_items[] | select(.food.image_url != null and .food.image_url != "") | .food.image_url][0]) // ""), sides: ([.menu_items[] | select(.food != null) | .food.name][1:] | join(", "))}]}' raw.json > menu.json
          echo "Generated menu.json:"
          cat menu.json
          rm raw.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add menu.json
          git commit -m "Update menu for $(date +%Y-%m-%d)" || exit 0
          git push
